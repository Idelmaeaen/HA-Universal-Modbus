name: Publish HACS release asset

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to package
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    name: Build and upload integration archive
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: release
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out released source
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Build HACS archive
        working-directory: custom_components/universal_modbus
        run: zip -r "$GITHUB_WORKSPACE/universal_modbus.zip" . -x '*.pyc' '*/__pycache__/*'

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: gh release upload "$RELEASE_TAG" universal_modbus.zip --clobber
